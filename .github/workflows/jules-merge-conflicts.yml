name: PR Code Block Merger

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch: # Allow manual triggers

jobs:
  merge-blocked-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0 # Full history needed for merge operations

      - name: Find and resolve PRs with merge conflicts
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Helper: run a shell command and return stdout
            function run(cmd) {
              console.log(`    $ ${cmd}`);
              return execSync(cmd, { encoding: 'utf-8', stdio: ['pipe', 'pipe', 'pipe'] }).trim();
            }

            // Helper: run a shell command, return { ok, stdout, stderr }
            function tryRun(cmd) {
              console.log(`    $ ${cmd}`);
              try {
                const stdout = execSync(cmd, { encoding: 'utf-8', stdio: ['pipe', 'pipe', 'pipe'] }).trim();
                return { ok: true, stdout, stderr: '' };
              } catch (e) {
                return { ok: false, stdout: e.stdout?.trim() || '', stderr: e.stderr?.trim() || '' };
              }
            }

            console.log(`\n========================================`);
            console.log(`🔍 Analyzing repository: ${owner}/${repo}`);
            console.log(`========================================\n`);

            // Configure git identity for merge commits
            run(`git config user.name "github-actions[bot]"`);
            run(`git config user.email "github-actions[bot]@users.noreply.github.com"`);

            // 1. Fetch all open pull requests
            let allPRs = [];
            let page = 1;
            while (true) {
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                per_page: 100,
                page,
              });
              if (prs.length === 0) break;
              allPRs = allPRs.concat(prs);
              page++;
            }

            console.log(`📋 Found ${allPRs.length} open PR(s) total.\n`);

            if (allPRs.length === 0) {
              console.log(`✅ No open PRs found. Nothing to do.`);
              return;
            }

            // 2. Categorize PRs by their mergeable state
            const conflictPRs = [];  // dirty — true merge conflicts
            const behindPRs = [];    // behind/blocked — just needs branch update
            const skippedPRs = [];   // clean or other states

            for (const pr of allPRs) {
              console.log(`  Checking PR #${pr.number}: "${pr.title}" ...`);

              let detail;
              let retries = 0;

              // GitHub computes mergeability async — poll briefly
              while (retries < 5) {
                const { data } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: pr.number,
                });
                detail = data;
                if (detail.mergeable !== null) break;
                retries++;
                await new Promise((r) => setTimeout(r, 3000));
              }

              const state = detail.mergeable_state;
              const mergeable = detail.mergeable;

              console.log(`    ├─ mergeable: ${mergeable}, mergeable_state: "${state}"`);

              if (state === 'dirty') {
                console.log(`    └─ ⚠️  PR #${pr.number} has MERGE CONFLICTS. Queuing for conflict resolution.\n`);
                conflictPRs.push(detail);
              } else if (state === 'behind' || (state === 'blocked' && mergeable === true)) {
                console.log(`    └─ 🔄 PR #${pr.number} is behind base branch. Queuing for branch update.\n`);
                behindPRs.push(detail);
              } else {
                console.log(`    └─ ✔️  No merge issues (state: "${state}"). Skipping.\n`);
                skippedPRs.push(detail);
              }
            }

            const totalBlocked = conflictPRs.length + behindPRs.length;
            console.log(`\n========================================`);
            console.log(`📌 ${totalBlocked} PR(s) need attention:`);
            console.log(`   🔴 ${conflictPRs.length} with merge conflicts (dirty)`);
            console.log(`   🟡 ${behindPRs.length} behind base branch`);
            console.log(`   🟢 ${skippedPRs.length} already clean`);
            console.log(`========================================\n`);

            if (totalBlocked === 0) {
              console.log(`✅ All PRs are up-to-date. No merge updates needed.`);
              return;
            }

            const results = [];

            // 3a. Handle "behind" PRs — simple API branch update
            for (const pr of behindPRs) {
              console.log(`\n─── Updating PR #${pr.number}: "${pr.title}" (behind) ───`);
              console.log(`    Branch: ${pr.head.ref} → ${pr.base.ref}`);

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pr.number,
                });
                console.log(`    ✅ SUCCESS — Branch updated via API.`);
                results.push({ number: pr.number, title: pr.title, type: 'behind', status: 'success' });
              } catch (error) {
                console.log(`    ❌ FAILED — ${error.message}`);
                results.push({ number: pr.number, title: pr.title, type: 'behind', status: 'failed', error: error.message });
              }
            }

            // 3b. Handle "dirty" PRs — actual merge conflict resolution via git
            for (const pr of conflictPRs) {
              console.log(`\n─── Resolving conflicts for PR #${pr.number}: "${pr.title}" (dirty) ───`);
              console.log(`    Repository : ${owner}/${repo}`);
              console.log(`    Branch     : ${pr.head.ref} → ${pr.base.ref}`);
              console.log(`    Author     : ${pr.user.login}`);
              console.log(`    Conflicting files will be resolved by accepting the PR branch version`);
              console.log(`    (the incoming feature branch) for conflicted sections.\n`);

              try {
                // Fetch latest remote state
                run(`git fetch origin`);

                // Check out the PR branch
                const branchExists = tryRun(`git rev-parse --verify ${pr.head.ref}`);
                if (branchExists.ok) {
                  run(`git checkout ${pr.head.ref}`);
                  run(`git reset --hard origin/${pr.head.ref}`);
                } else {
                  run(`git checkout -b ${pr.head.ref} origin/${pr.head.ref}`);
                }

                // Attempt the merge from the base branch
                const mergeResult = tryRun(`git merge origin/${pr.base.ref} --no-edit`);

                if (mergeResult.ok) {
                  // No conflicts after all (maybe resolved upstream)
                  console.log(`    ℹ️  Merge completed cleanly — no conflicts found.`);
                  run(`git push origin ${pr.head.ref}`);
                  console.log(`    ✅ SUCCESS — Branch pushed.`);
                  results.push({ number: pr.number, title: pr.title, type: 'conflict', status: 'success' });
                } else {
                  // There are conflicts — resolve them
                  console.log(`    🔧 Merge conflicts detected. Resolving...\n`);

                  // Get list of conflicted files
                  const conflictedFiles = run(`git diff --name-only --diff-filter=U`).split('\n').filter(Boolean);

                  console.log(`    📄 Conflicted files (${conflictedFiles.length}):`);
                  for (const file of conflictedFiles) {
                    console.log(`       - ${file}`);
                  }
                  console.log('');

                  // Resolve each conflict by accepting the PR branch (theirs in
                  // this context is the base branch we're merging in, ours is the
                  // PR branch we're on). We want to keep the PR branch's version
                  // for conflicts, effectively saying "the feature branch wins".
                  for (const file of conflictedFiles) {
                    console.log(`    Resolving: ${file}`);

                    // Try checkout --ours (PR branch version) first
                    const resolveResult = tryRun(`git checkout --ours "${file}"`);
                    if (resolveResult.ok) {
                      run(`git add "${file}"`);
                      console.log(`      ✔ Resolved with PR branch version (--ours)`);
                    } else {
                      // If file was deleted on one side, just add whatever exists
                      const addResult = tryRun(`git add "${file}"`);
                      if (addResult.ok) {
                        console.log(`      ✔ Added existing version`);
                      } else {
                        // File deleted on PR branch — accept the deletion
                        tryRun(`git rm "${file}"`);
                        console.log(`      ✔ Accepted deletion`);
                      }
                    }
                  }

                  // Check if there are still unresolved conflicts
                  const remaining = tryRun(`git diff --name-only --diff-filter=U`);
                  if (remaining.ok && remaining.stdout.length > 0) {
                    throw new Error(`Unresolved conflicts remain in: ${remaining.stdout}`);
                  }

                  // Commit the resolution
                  run(`git commit --no-edit`);
                  console.log(`\n    📦 Conflict resolution committed.`);

                  // Push to the PR branch
                  run(`git push origin ${pr.head.ref}`);
                  console.log(`    ✅ SUCCESS — Conflicts resolved and pushed to PR #${pr.number}.`);
                  results.push({ number: pr.number, title: pr.title, type: 'conflict', status: 'success' });
                }

              } catch (error) {
                console.log(`    ❌ FAILED — Could not resolve conflicts for PR #${pr.number}.`);
                console.log(`    Error: ${error.message}`);
                results.push({ number: pr.number, title: pr.title, type: 'conflict', status: 'failed', error: error.message });

                // Clean up — abort any in-progress merge and go back to main
                tryRun(`git merge --abort`);
                tryRun(`git checkout main`);
              }
            }

            // 4. Final summary
            console.log(`\n\n========================================`);
            console.log(`📊 MERGE RESOLUTION SUMMARY — ${owner}/${repo}`);
            console.log(`========================================\n`);

            const succeeded = results.filter((r) => r.status === 'success');
            const failed = results.filter((r) => r.status === 'failed');

            for (const r of results) {
              const icon = r.status === 'success' ? '✅' : '❌';
              const typeLabel = r.type === 'conflict' ? '🔴 conflict' : '🟡 behind';
              console.log(`  ${icon} PR #${r.number} (${typeLabel}) — "${r.title}" → ${r.status.toUpperCase()}`);
              if (r.error) {
                console.log(`      └─ Error: ${r.error}`);
              }
            }

            console.log(`\n────────────────────────────────────────`);
            console.log(`  Total processed : ${results.length}`);
            console.log(`  Succeeded       : ${succeeded.length}`);
            console.log(`  Failed          : ${failed.length}`);
            console.log(`────────────────────────────────────────\n`);

            if (failed.length === 0 && results.length > 0) {
              console.log(`🎉 All "merge code required" instances have been resolved successfully!`);
            } else if (failed.length > 0) {
              console.log(`⚠️  ${failed.length} PR(s) could not be resolved. Review the errors above.`);
              core.setFailed(`${failed.length} PR conflict resolution(s) failed.`);
            } else {
              console.log(`✅ No PRs needed attention.`);
            }
